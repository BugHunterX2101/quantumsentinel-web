services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: quantumsentinel
      POSTGRES_USER: quantumsentinel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantumsentinel -d quantumsentinel"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  quantumsentinel:
    build: .
    restart: unless-stopped
    env_file: ${PRODUCTION_ENV_FILE:-.env.production}
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://quantumsentinel:${POSTGRES_PASSWORD}@postgres:5432/quantumsentinel
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    expose: ["8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/tls:/etc/nginx/tls:ro
    depends_on:
      quantumsentinel:
        condition: service_healthy

  backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["while true; do pg_dump -h postgres -U quantumsentinel -d quantumsentinel -Fc > /backups/quantumsentinel-$$(date +%Y%m%d%H%M%S).dump && find /backups -type f -mtime +7 -delete; sleep 21600; done"]

volumes:
  postgres_data:
  redis_data:
  postgres_backups:
